<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- آیکون‌ها -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<script>
  if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
  }
</script>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Support Panel</h3>

    <button onclick="showSection('home')">
      <i data-lucide="home"></i> Home
    </button>

    <button onclick="showSection('clients')">
      <i data-lucide="users"></i> Clients
    </button>

    <button onclick="showSection('tickets')">
      <i data-lucide="mail"></i> Tickets
    </button>

    <button onclick="logout()">
      <i data-lucide="log-out"></i> Logout
    </button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div id="home" class="section">
      <h1>Welcome 👋</h1>
      <p>Admin Panel: Support Dashboard</p>
    </div>

    <div id="clients" class="section hidden">
      <h2>Clients</h2>

      <table>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
        </tr>

        <tr>
          <td>Ali</td>
          <td>ali@mail.com</td>
          <td>Active</td>
        </tr>

        <tr>
          <td>Sara</td>
          <td>sara@mail.com</td>
          <td>Pending</td>
        </tr>
      </table>
    </div>

    <div id="tickets" class="section hidden">
      <h2>Tickets</h2>

      <div class="card">Ticket #1 - Deposit issue</div>
      <div class="card">Ticket #2 - Login problem</div>
    </div>

  </div>
</div>

<script src="script.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
